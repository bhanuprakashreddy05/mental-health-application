name: Full Quality Testing Suite (1800 Tests)

# ──────────────────────────────────────────────────────────────────────────────
# STANDALONE WORKFLOW — does NOT touch any existing workflow files.
# Existing workflows (ci.yml, e2e.yml, load-test.yml, android.yml, backend.yml,
# frontend.yml, candidate_e2e_tests.yml, python_e2e_report.yml,
# vulnerability-security-test.yml) are completely unchanged.
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  JAVA_VERSION: "17"

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1: Setup
  # ════════════════════════════════════════════════════════════════════════════
  setup:
    name: ⚙️ Setup Environment
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Python Dependencies
        run: pip install --upgrade pip openpyxl

      - name: 📦 Install Node Dependencies (Frontend)
        run: |
          if [ -f "frontend/package.json" ]; then
            cd frontend && npm ci --prefer-offline || npm install
          fi
        continue-on-error: true

      - name: ✅ Environment Verified
        run: |
          echo "==========================================="
          echo "  Full Quality Testing Suite — Setup OK"
          echo "==========================================="
          node --version
          python3 --version
          java -version 2>&1 | head -1
          pip show openpyxl | grep Version
          echo "==========================================="

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2: Selenium Web Testing (300 cases)
  # ════════════════════════════════════════════════════════════════════════════
  selenium-tests:
    name: 🌐 Selenium — Website Tests (300)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🌐 Run 300 Selenium Web Tests
        run: |
          mkdir -p reports/selenium
          echo "Running Selenium Web Testing Suite (300 cases)..."
          node tests/selenium/selenium_tests.js
          echo "Selenium tests completed."
        continue-on-error: true

      - name: 📊 Show Selenium Summary
        run: |
          if [ -f "reports/selenium/selenium-results.json" ]; then
            python3 -c "
          import json
          with open('reports/selenium/selenium-results.json') as f:
              r = json.load(f)
          print(f'Selenium: {r[\"total\"]} total | {r[\"pass\"]} passed | {r[\"fail\"]} failed | {r[\"pass_rate\"]}')
          "
          fi

      - name: ⬆️ Upload Selenium Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-logs
          path: reports/selenium/
          retention-days: 30

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3: Appium Mobile Testing (300 cases)
  # ════════════════════════════════════════════════════════════════════════════
  appium-tests:
    name: 📱 Appium — Android Tests (300)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📱 Run 300 Appium Mobile Tests
        run: |
          mkdir -p reports/appium
          echo "Running Appium Mobile Testing Suite (300 cases)..."
          node tests/appium/mobile_tests.js
          echo "Appium tests completed."
        continue-on-error: true

      - name: 📊 Show Appium Summary
        run: |
          if [ -f "reports/appium/appium-results.json" ]; then
            python3 -c "
          import json
          with open('reports/appium/appium-results.json') as f:
              r = json.load(f)
          print(f'Appium: {r[\"total\"]} total | {r[\"pass\"]} passed | {r[\"fail\"]} failed | {r[\"pass_rate\"]}')
          "
          fi

      - name: ⬆️ Upload Appium Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-logs
          path: reports/appium/
          retention-days: 30

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 4: API Testing (300 cases)
  # ════════════════════════════════════════════════════════════════════════════
  api-tests:
    name: 🔌 Unit/API Tests (300)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔌 Run 300 API Tests
        run: |
          mkdir -p reports/api
          echo "Running API Testing Suite (300 cases)..."
          node tests/api/api_tests.js
          echo "API tests completed."
        continue-on-error: true

      - name: 📊 Show API Summary
        run: |
          if [ -f "reports/api/api-results.json" ]; then
            python3 -c "
          import json
          with open('reports/api/api-results.json') as f:
              r = json.load(f)
          print(f'API: {r[\"total\"]} total | {r[\"pass\"]} passed | {r[\"fail\"]} failed | {r[\"pass_rate\"]}')
          "
          fi

      - name: ⬆️ Upload API Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-logs
          path: reports/api/
          retention-days: 30

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 5: Validation Testing (300 cases)
  # ════════════════════════════════════════════════════════════════════════════
  validation-tests:
    name: ✅ Validation Tests (300)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: ✅ Run 300 Validation Tests
        run: |
          mkdir -p reports/validation
          echo "Running Validation Testing Suite (300 cases)..."
          node tests/validation/validation_tests.js
          echo "Validation tests completed."
        continue-on-error: true

      - name: 📊 Show Validation Summary
        run: |
          if [ -f "reports/validation/validation-results.json" ]; then
            python3 -c "
          import json
          with open('reports/validation/validation-results.json') as f:
              r = json.load(f)
          print(f'Validation: {r[\"total\"]} total | {r[\"pass\"]} passed | {r[\"fail\"]} failed | {r[\"pass_rate\"]}')
          "
          fi

      - name: ⬆️ Upload Validation Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-logs
          path: reports/validation/
          retention-days: 30

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 6: Deployment Testing (300 cases)
  # ════════════════════════════════════════════════════════════════════════════
  deployment-tests:
    name: 🚀 Deployment Tests (300)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🚀 Run 300 Deployment Tests
        run: |
          mkdir -p reports/deployment
          echo "Running Deployment Testing Suite (300 cases)..."
          node tests/deployment/deployment_tests.js
          echo "Deployment tests completed."
        continue-on-error: true

      - name: 📊 Show Deployment Summary
        run: |
          if [ -f "reports/deployment/deployment-results.json" ]; then
            python3 -c "
          import json
          with open('reports/deployment/deployment-results.json') as f:
              r = json.load(f)
          print(f'Deployment: {r[\"total\"]} total | {r[\"pass\"]} passed | {r[\"fail\"]} failed | {r[\"pass_rate\"]}')
          "
          fi

      - name: ⬆️ Upload Deployment Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deployment-logs
          path: reports/deployment/
          retention-days: 30

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 7: Load & Performance Testing (300 cases)
  # ════════════════════════════════════════════════════════════════════════════
  load-tests:
    name: ⚡ Load Testing (300)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: ⚡ Run 300 Load & Performance Tests
        run: |
          mkdir -p reports/load
          echo "Running Load & Performance Testing Suite (300 cases)..."
          node tests/load/k6_load_test.js
          echo "Load tests completed."
        continue-on-error: true

      - name: 📊 Show Load Test Summary
        run: |
          if [ -f "reports/load/load-results.json" ]; then
            python3 -c "
          import json
          with open('reports/load/load-results.json') as f:
              r = json.load(f)
          m = r.get('performance_metrics', {})
          print(f'Load: {r[\"total\"]} total | {r[\"pass\"]} passed | {r[\"fail\"]} failed | {r[\"pass_rate\"]}')
          print(f'Perf: avg_rps={m.get(\"avg_rps\",0)} | p95={m.get(\"p95\",0)}ms | p99={m.get(\"p99\",0)}ms')
          "
          fi

      - name: ⬆️ Upload Load Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-reports
          path: reports/load/
          retention-days: 30

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 8: Compile Master Report
  # ════════════════════════════════════════════════════════════════════════════
  compile-master-report:
    name: 📊 Compile Master Report (1800 Tests)
    runs-on: ubuntu-latest
    needs:
      - selenium-tests
      - appium-tests
      - api-tests
      - validation-tests
      - deployment-tests
      - load-tests
    if: always()
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install openpyxl
        run: pip install --upgrade pip openpyxl

      - name: 📥 Download Selenium Results
        uses: actions/download-artifact@v4
        with:
          name: selenium-logs
          path: reports/selenium/
        continue-on-error: true

      - name: 📥 Download Appium Results
        uses: actions/download-artifact@v4
        with:
          name: appium-logs
          path: reports/appium/
        continue-on-error: true

      - name: 📥 Download API Results
        uses: actions/download-artifact@v4
        with:
          name: api-logs
          path: reports/api/
        continue-on-error: true

      - name: 📥 Download Validation Results
        uses: actions/download-artifact@v4
        with:
          name: validation-logs
          path: reports/validation/
        continue-on-error: true

      - name: 📥 Download Deployment Results
        uses: actions/download-artifact@v4
        with:
          name: deployment-logs
          path: reports/deployment/
        continue-on-error: true

      - name: 📥 Download Load Test Results
        uses: actions/download-artifact@v4
        with:
          name: load-test-reports
          path: reports/load/
        continue-on-error: true

      - name: 📊 Generate Master Excel Report
        run: |
          echo "Compiling Master Test Report from all 6 modules..."
          python3 reports/generate_master_report.py
          echo "Master report generated."

      - name: ✅ Verify Master Report
        run: |
          if [ -f "reports/Master_Test_Report.xlsx" ]; then
            SIZE=$(stat -c%s "reports/Master_Test_Report.xlsx")
            echo "Master report: reports/Master_Test_Report.xlsx (${SIZE} bytes)"
          else
            echo "Master report not found!"
            exit 1
          fi

      - name: ⬆️ Upload Master Excel Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Master_Test_Report
          path: reports/Master_Test_Report.xlsx
          retention-days: 90

      - name: ⬆️ Upload Complete Test Bundle
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: complete-quality-bundle
          path: reports/
          retention-days: 30

      - name: 📋 Final Console Summary
        run: |
          python3 -c "
          import json, os

          modules = {
              'Selenium Web Testing':       'reports/selenium/selenium-results.json',
              'Appium Mobile Testing':      'reports/appium/appium-results.json',
              'API Testing':                'reports/api/api-results.json',
              'Validation Testing':         'reports/validation/validation-results.json',
              'Deployment Testing':         'reports/deployment/deployment-results.json',
              'Load & Performance Testing': 'reports/load/load-results.json',
          }

          icons = {
              'Selenium Web Testing':       'SEL',
              'Appium Mobile Testing':      'MOB',
              'API Testing':                'API',
              'Validation Testing':         'VAL',
              'Deployment Testing':         'DEP',
              'Load & Performance Testing': 'LOAD',
          }

          print()
          print('=' * 65)
          print('  KisaanConnect — Full Quality Testing Suite Results')
          print('=' * 65)

          grand_total = grand_pass = grand_fail = 0
          for name, path in modules.items():
              if os.path.exists(path):
                  with open(path) as f:
                      r = json.load(f)
                  icon = 'PASS' if r['fail'] == 0 else 'WARN'
                  status_str = '[OK]  ' if r['fail'] == 0 else '[WARN]'
                  grand_total += r['total']
                  grand_pass  += r['pass']
                  grand_fail  += r['fail']
                  print(f'  {status_str} {name:<32} {r[\"total\"]:>4} tests | {r[\"pass\"]:>4} pass | {r[\"fail\"]:>3} fail')
              else:
                  print(f'  [SKIP] {name:<32} (no results file found)')
          print('-' * 65)
          rate = f'{(grand_pass/grand_total*100):.1f}%' if grand_total else '0%'
          grade = 'A+' if grand_fail==0 else 'A' if grand_fail<30 else 'B' if grand_fail<90 else 'C'
          print(f'  TOTAL                              {grand_total:>4} tests | {grand_pass:>4} pass | {grand_fail:>3} fail')
          print(f'  Pass Rate: {rate}   |   Grade: {grade}')
          print('=' * 65)
          print()
          "

      - name: 📝 GitHub Step Summary
        run: |
          echo "## Full Quality Testing Suite Results" >> \$GITHUB_STEP_SUMMARY
          echo "" >> \$GITHUB_STEP_SUMMARY
          echo "| # | Module | Tests | Passed | Failed | Status |" >> \$GITHUB_STEP_SUMMARY
          echo "|---|--------|-------|--------|--------|--------|" >> \$GITHUB_STEP_SUMMARY
          python3 -c "
          import json, os

          modules = [
              ('1', 'Selenium Web Testing',       'reports/selenium/selenium-results.json'),
              ('2', 'Appium Mobile Testing',      'reports/appium/appium-results.json'),
              ('3', 'API Testing',                'reports/api/api-results.json'),
              ('4', 'Validation Testing',         'reports/validation/validation-results.json'),
              ('5', 'Deployment Testing',         'reports/deployment/deployment-results.json'),
              ('6', 'Load & Performance Testing', 'reports/load/load-results.json'),
          ]

          summary_file = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null')
          with open(summary_file, 'a') as out:
              grand_total = grand_pass = grand_fail = 0
              for num, name, path in modules:
                  if os.path.exists(path):
                      with open(path) as f:
                          r = json.load(f)
                      icon = '✅' if r['fail'] == 0 else '⚠️'
                      grand_total += r['total']
                      grand_pass  += r['pass']
                      grand_fail  += r['fail']
                      out.write(f\"| {num} | {name} | {r['total']} | {r['pass']} | {r['fail']} | {icon} |\\n\")
                  else:
                      out.write(f'| {num} | {name} | - | - | - | ⏭️ |\\n')
              rate = f'{(grand_pass/grand_total*100):.1f}%' if grand_total else '0%'
              grade = 'A+' if grand_fail==0 else 'A' if grand_fail<30 else 'B' if grand_fail<90 else 'C'
              out.write(f'| | **TOTAL** | **{grand_total}** | **{grand_pass}** | **{grand_fail}** | **{grade}** |\\n')
              out.write('\\n')
              out.write(f'**Pass Rate**: {rate} | **Grade**: {grade}\\n\\n')
              out.write('📄 Download **Master_Test_Report.xlsx** from the Artifacts section below.\\n')
          " 2>/dev/null || true

name: Android App CI

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.env.example'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.env.example'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build-test-android:
    name: Android Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10

      - name: Configure local environment
        run: |
          cp .env.example .env

      - name: Run Android Unit & Robolectric Tests
        run: gradle testDebugUnitTest --no-daemon

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: peacemind-android-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

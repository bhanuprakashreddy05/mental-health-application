name: Peaceful Mind CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Build, Lint, and Test Backend (Node.js)
  build-test-backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Run Security Audit
        run: npm audit --audit-level=high || true

      - name: Install Dependencies
        run: npm install

      - name: Run ESLint Checks
        run: npm run lint

      - name: Run Backend Unit Tests
        run: npm test

  # 2. Build, Lint, Test, and Deploy Frontend (Node.js & Firebase)
  build-test-frontend:
    name: Frontend CI & Deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Run Security Audit
        run: npm audit --audit-level=high || true

      - name: Install Dependencies
        run: npm install

      - name: Run ESLint Checks
        run: npm run lint

      - name: Run Frontend Unit Tests
        run: npm test -- --watchAll=false

      - name: Compile Production Build
        run: npm run build

      - name: Deploy to Firebase Hosting
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: .
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          echo "Installing Firebase CLI..."
          npm install -g firebase-tools
          echo "Deploying to Firebase Hosting..."
          firebase deploy --only hosting --project "$FIREBASE_PROJECT_ID" --token "$FIREBASE_TOKEN"

  # 3. Build and Test Android Application (Gradle/Kotlin)
  build-test-android:
    name: Android App CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10

      - name: Configure local environment
        run: |
          cp .env.example .env

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Android Unit & Robolectric Tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: peacemind-android-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

  # 4. Execute Python E2E Simulation and Publish Reports
  python-e2e-report:
    name: Python E2E Simulation Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run E2E Test Simulation
        run: python run_e2e_tests.py

      - name: Upload E2E Test Report Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: peacemind-e2e-test-reports
          path: |
            E2E_Test_Report_PeaceMind.xlsx
            E2E_Test_Report_PeaceMind_*.xlsx

  # 5. Run Candidate E2E Tests (Selenium & Chrome Headless)
  candidate-e2e-tests:
    name: Candidate E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Start Vite Development Server
        run: |
          npm run dev &
          npx wait-on http://localhost:5173 -t 30000

      - name: Run Candidate E2E Tests
        continue-on-error: true
        env:
          BASE_URL: http://localhost:5173
          CI: 'true'
        run: npm run candidate-e2e

      - name: Upload Candidate E2E Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: candidate-e2e-reports
          path: frontend/candidate-e2e-report.json

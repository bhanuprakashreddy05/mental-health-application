name: Candidate E2E Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/e2e/**'
      - 'frontend/reportGenerator.cjs'
      - 'frontend/package.json'
      - '.github/workflows/candidate_e2e_tests.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/e2e/**'
      - 'frontend/reportGenerator.cjs'
      - 'frontend/package.json'
      - '.github/workflows/candidate_e2e_tests.yml'
  workflow_dispatch:

jobs:
  candidate-e2e-tests:
    name: Candidate E2E Suite Run
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm install

      - name: Install Frontend Dependencies
        run: npm install

      - name: Start Servers & Run Candidate E2E Tests
        env:
          BASE_URL: http://localhost:3000
          CI: 'true'
        run: |
          cd ../backend
          npm start &
          npx wait-on http://localhost:5000 -t 30000
          cd ../frontend
          npm run dev &
          npx wait-on http://localhost:3000 -t 30000
          npm run candidate-e2e

      - name: Upload Candidate E2E Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: candidate-e2e-reports
          path: frontend/candidate-e2e-report.json
